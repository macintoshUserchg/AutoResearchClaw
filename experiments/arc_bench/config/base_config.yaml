# ============================================================================
# Base config for ARC-Bench runs. The runner overrides topic, output, and
# sandbox paths per topic. Mirrors paper_replication/configs/base_config.yaml
# but with slightly tighter sandbox budgets tuned for the topics (all small).
# ============================================================================

project:
  name: "arc-bench"
  mode: "full-auto"

research:
  topic: "PLACEHOLDER — replaced with the topic string from topics.yaml"
  domains:
    - "machine-learning"
  daily_paper_count: 0
  quality_threshold: 3.5
  graceful_degradation: true

runtime:
  timezone: "Asia/Shanghai"
  max_parallel_tasks: 2
  approval_timeout_hours: 24
  retry_limit: 2

notifications:
  channel: "console"
  target: ""
  on_stage_start: false
  on_stage_fail: true
  on_gate_required: true

knowledge_base:
  backend: "markdown"
  root: "docs/kb"

openclaw_bridge:
  use_cron: false
  use_message: false
  use_memory: false
  use_sessions_spawn: false
  use_web_fetch: false
  use_browser: false

llm:
  provider: "openai-compatible"
  base_url: "https://api.openai.com/v1"
  api_key_env: "OPENAI_API_KEY"
  api_key: ""
  wire_api: "responses"
  primary_model: "gpt-5.3-codex"
  timeout_sec: 600
  fallback_models:
    - "gpt-5.1-codex-max"
    - "gpt-4o"

security:
  hitl_required_stages: []
  allow_publish_without_approval: true
  redact_sensitive_logs: true

experiment:
  mode: "sandbox"
  time_budget_sec: 1800
  max_iterations: 4
  metric_key: "primary_metric"
  metric_direction: "maximize"
  sandbox:
    python_path: "python3"
    gpu_required: false
    max_memory_mb: 8192
    allowed_imports:
      - "numpy"
      - "scipy"
      - "matplotlib"
      - "sklearn"
      - "pandas"
      - "statsmodels"
      - "networkx"
      - "skimage"
      - "qiskit"
      - "qiskit_aer"
      - "qiskit_algorithms"
      - "qiskit_machine_learning"
      - "qiskit_nature"
      - "pyscf"
      - "json"
      - "time"
      - "os"
      - "sys"
      - "math"
      - "random"
      - "collections"
      - "itertools"
      - "functools"
      - "typing"
      - "dataclasses"
      - "pathlib"
      - "csv"
  opencode:
    enabled: false
  figure_agent:
    enabled: true
    min_figures: 2
    max_figures: 5
    max_iterations: 2
    render_timeout_sec: 60
    output_format: "python"
    nano_banana_enabled: false
    strict_mode: false
    dpi: 200

prompts:
  custom_file: ""
