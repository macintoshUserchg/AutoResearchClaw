# ============================================================================
# ARC-Bench ML — 25 CPU-friendly ML research topics
# ----------------------------------------------------------------------------
# ML01-ML10 are kept in sync with experiments/hitl_ablation/topics.yaml so the
# two experiments share stimuli. ML11-ML25 are new, spanning additional ML
# subfields while staying CPU-executable in <10 min on a single core with
# numpy / scipy / sklearn / statsmodels / networkx.
# ============================================================================


topics:
- id: ML01
  topic: Comparing dropout regularization strategies (standard, spatial, variational)
    for preventing overfitting in shallow MLPs on tabular classification benchmarks
  domains:
  - machine-learning
  - regularization
  metric_key: test_accuracy
  metric_direction: maximize
- id: ML02
  topic: Evaluating ensemble methods (bagging, boosting, stacking) for regression
    on synthetic non-linear datasets with varying noise levels
  domains:
  - machine-learning
  - ensemble-methods
  metric_key: rmse
  metric_direction: minimize
- id: ML03
  topic: Comparing gradient-free optimization algorithms (Nelder-Mead, Powell, CMA-ES)
    for non-convex benchmark functions using only CPU computation
  domains:
  - optimization
  - numerical-methods
  metric_key: primary_metric
  metric_direction: minimize
- id: ML04
  topic: Analyzing the effect of feature scaling methods (standard, min-max, robust)
    on k-nearest neighbors classification performance across different data distributions
  domains:
  - machine-learning
  - data-preprocessing
  metric_key: test_accuracy
  metric_direction: maximize
- id: ML05
  topic: Investigating dimensionality reduction techniques (PCA, t-SNE, UMAP) for
    preserving cluster structure in high-dimensional synthetic datasets
  domains:
  - machine-learning
  - unsupervised-learning
  metric_key: silhouette_score
  metric_direction: maximize
- id: ML06
  topic: Comparing adaptive learning rate schedules (cosine annealing, step decay,
