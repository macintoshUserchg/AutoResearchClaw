# ============================================================================
# Q05 — Barren plateau onset under cost-function locality
# ----------------------------------------------------------------------------
# Open research question. Holding qubit count (n=6) and ansatz family
# (hardware-efficient EfficientSU2) fixed, vary (a) the cost-function
# locality (single-qubit Z vs all-qubit Z product) and (b) the ansatz depth
# L. Measure the empirical variance of the gradient with respect to the
# first parameter across 100 random parameter samples per cell. Tests the
# Cerezo et al. 2021 prediction that local cost functions retain
# polynomial gradient variance even when global cost functions exhibit
# exponential decay (barren plateau).
# ============================================================================

id: Q05
title: "Barren plateau onset under cost-function locality"
arxiv_id: null
venue: "ARC-Bench 2026"
paper_asset: null

synthesis: |
  A barren plateau is the phenomenon, first identified by McClean et al.
  in 2018, that the gradient of a variational quantum circuit's loss
  becomes exponentially small in the number of qubits when the ansatz is
  drawn from a sufficiently random circuit ensemble. Concretely, for a
  loss L(theta) = <psi(theta)|H|psi(theta)> where the parameterized
  state is generated by a random-ish unitary, the variance of the
  gradient dL/dtheta_k scales as O(1/2^n). For n = 20 qubits this
  variance is below machine epsilon, and SGD or any gradient-based
  optimizer has effectively zero signal to follow. This is the central
  trainability obstruction in variational quantum machine learning.

  Cerezo et al. ("Cost function dependent barren plateaus in shallow
  parametrized quantum neural networks", Nature Communications 2021)
  showed that the locality of the cost function matters. If the cost is
  a sum of single-qubit Pauli expectations (a local cost), then the
  gradient variance can scale only polynomially in n even at moderate
  ansatz depth. If the cost is a product or projection over all qubits
  (a global cost), the variance is exponentially suppressed at any
  depth. The mechanism is that local-cost observables overlap with only
  a constant-size subspace of the 2^n dimensional Hilbert space, while
  global-cost observables are spread thinly across the entire space and
  almost always cancel.

  The empirical question this topic addresses is whether the local-cost
  free lunch holds at moderate depth on a CPU-feasible 6-qubit
  benchmark. We fix n=6 qubits and the EfficientSU2 hardware-efficient
  ansatz family (a standard choice in qiskit). We vary depth (number of
  ansatz layers L) and cost-function locality, then directly probe the
  gradient distribution by sampling 100 random parameter vectors per
  cell, computing the parameter-shift gradient with respect to theta_0
  for each, and reporting the empirical variance. A subsidiary check
  trains each condition for 100 Adam iterations and reports the loss
  change as a practical sanity probe of whether the gradient signal is
  large enough to drive optimization at all.

  Implementation guidance is provided by the quantum-qiskit skill,
  which is automatically injected at stage 10. Use qiskit.circuit.library
  EfficientSU2 verbatim; do NOT hand-write H/CNOT/RY gate stacks (a
  prior failed run produced an "ablation failure" where three nominally
  different encodings collapsed to identical circuits because they
  were hand-coded). Use qiskit_algorithms.utils.algorithm_globals
  random_seed for reproducibility. Gradients are computed via the
  parameter-shift rule on a statevector backend.

  Experimental protocol. Four conditions cover the cost x depth grid:
  (local_cost_L2) shallow + local, the trainable control; (local_cost_L10)
  medium + local, the regime Cerezo's theorem predicts is still
  trainable; (local_cost_L20) deep + local, stressing the prediction;
  (global_cost_L10) medium + global, the negative control where a barren
  plateau is expected. Each condition is run with 3 different random
  ansatz-structure seeds (controlling which qubits are entangled in each
  EfficientSU2 layer) for variance estimation across architectures, and
  100 random parameter vectors per (condition, structure-seed) cell are
  used to estimate gradient variance. Total cells: 4 conditions x 3
  ansatz seeds = 12 cells. No external dataset is required because this
  is a measurement experiment on the ansatz family itself.

  Research question: *Does the local-cost trick avoid the barren plateau
  on a 6-qubit EfficientSU2 ansatz at L=10 and L=20 ansatz depth, as
  predicted by Cerezo et al. 2021, when compared against the
  global-cost baseline at the same depth and against the shallow local-cost
  control?*

hypotheses:
  - id: H1
    statement: "At ansatz depth L=10, the empirical variance of the gradient under local cost is at least 20 times larger than under global cost (3-seed mean of variance per condition), confirming Cerezo et al. 2021's prediction that locality changes the barren-plateau scaling."
    measurable: true
  - id: H2
    statement: "Under local cost, the gradient variance at L=20 is at least 1/100 of the gradient variance at L=2, i.e. the polynomial (sub-exponential) decay regime is maintained even at deep ansatz, with log10(var_L20) - log10(var_L2) > -2.0 (3-seed mean)."
    measurable: true
  - id: H3
    statement: "When trained with Adam for 100 gradient steps starting from random initialization, the global-cost-L10 condition produces a loss change of at most 1 percent of the initial loss (3-seed mean), demonstrating that the predicted barren plateau actively prevents practical training, while the local-cost-L10 condition produces a loss change of at least 10 percent."
    measurable: true

experiment_design:
  research_question: "Does the local-cost trick avoid the barren plateau on a 6-qubit EfficientSU2 ansatz at L=10 and L=20, as predicted by Cerezo et al. 2021, when compared against the global-cost baseline and a shallow local-cost control?"
  conditions:
    - name: "local_cost_L10"
      description: "Proposed-method core. EfficientSU2(num_qubits=6, reps=10, entanglement='linear') ansatz. Cost function: <Z_0> (expectation of Pauli Z on qubit 0 only). 100 random parameter vectors theta drawn from Uniform[-pi, pi]^{n_params}. For each theta, compute parameter-shift gradient dL/dtheta_0 by evaluating L at theta + (pi/2) * e_0 and theta - (pi/2) * e_0. Report variance of these 100 gradient values."
    - name: "local_cost_L20"
      description: "Proposed-method stress test. EfficientSU2 reps=20, same local cost <Z_0>. Tests whether the polynomial-decay prediction holds at deeper ansatz."
  baselines:
    - "local_cost_L2: trainable-control baseline. EfficientSU2 reps=2, local cost <Z_0>. Known to have non-vanishing gradient because the ansatz is too shallow to enter the barren-plateau regime."
    - "global_cost_L10: barren-plateau negative-control baseline. EfficientSU2 reps=10, global cost <Z_0 Z_1 Z_2 Z_3 Z_4 Z_5> (product of Z on all 6 qubits). Known from Cerezo 2021 to exhibit exponentially small gradient variance even though the ansatz depth matches local_cost_L10."
  metrics:
    - name: "log_gradient_variance"
      direction: "maximize"
      description: "log10 of the empirical variance of dL/dtheta_0 over 100 random parameter samples. Higher means more trainable gradient signal. Primary metric. Less negative numbers are better (closer to 0)."
    - name: "mean_absolute_gradient"
      direction: "maximize"
      description: "Mean of |dL/dtheta_0| over the 100 random samples."
    - name: "training_loss_change_fraction"
      direction: "maximize"
      description: "Relative loss change after 100 Adam steps starting from a random initialization: (L_initial - L_after_100_steps) / |L_initial|. Practical training-feasibility probe. Larger positive means training actually moved the loss."
  datasets:
    - name: "random_parameter_samples"
      source: "Synthetic, generated in-script via numpy.random.RandomState(ansatz_structure_seed).uniform(-pi, pi, size=(100, n_params))"
      description: "Each cell samples 100 random parameter vectors in the parameter space of EfficientSU2 at the given (num_qubits, reps). These are the inputs over which gradient variance is estimated. No external data is involved; this is a measurement experiment on the ansatz family."
  compute_requirements:
    gpu_required: false
    estimated_wall_clock_sec: 600

